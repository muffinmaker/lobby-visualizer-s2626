<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lobby Visualizer</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: system-ui, -apple-system, sans-serif;
      }

      canvas {
        display: block;
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
      }

      #overlay {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #hint {
        position: fixed;
        bottom: 1.25rem;
        left: 50%;
        transform: translateX(-50%);
        color: rgba(255, 255, 255, 0.35);
        font-size: 0.75rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        transition: opacity 1.2s ease;
        z-index: 20;
      }

      #hint.hidden {
        opacity: 0;
      }

      :root {
        --menu-bg-alpha: 0.8;
      }

      .lil-gui {
        --background-color: rgb(31 31 31 / var(--menu-bg-alpha));
        --title-background-color: rgb(17 17 17 / var(--menu-bg-alpha));
        --name-width: 36%;
        --spacing: 2px;
        --widget-padding: 0 1px 0 1.5px;
        --slider-input-width: 2.65rem;
        --slider-input-min-width: 2.65rem;
        max-width: 100%;
        overflow-x: hidden;
      }

      .lil-gui.root {
        -webkit-backdrop-filter: blur(10px);
        backdrop-filter: blur(10px);
        overflow-x: hidden;
        max-width: var(--width, 360px);
      }

      .lil-gui.root > .children,
      .lil-gui .children {
        overflow-x: hidden;
        max-width: 100%;
      }

      .lil-gui .controller {
        min-width: 0;
        max-width: 100%;
        overflow: hidden;
      }

      .lil-gui .controller.gamepad-menu-focus {
        outline: 2px solid rgba(120, 200, 255, 0.9);
        outline-offset: 1px;
        background: rgba(120, 200, 255, 0.1);
      }

      .lil-gui:not(.root) > .title.gamepad-menu-focus {
        outline: 2px solid rgba(120, 200, 255, 0.9);
        outline-offset: 1px;
        background: rgba(120, 200, 255, 0.14);
      }

      .lil-gui:not(.root).closed > .title.gamepad-menu-focus::after {
        content: ' ◂';
        opacity: 0.65;
        font-size: 0.85em;
      }

      .lil-gui:not(.root):not(.closed) > .title.gamepad-menu-focus::after {
        content: ' ▾';
        opacity: 0.65;
        font-size: 0.85em;
      }

      .lil-gui .controller > .name {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        min-width: 0;
      }

      .lil-gui .controller .widget {
        min-width: 0;
        overflow: hidden;
      }

      .lil-gui .controller.number.hasSlider input {
        width: 2.65rem;
        min-width: 2.65rem;
        max-width: 2.65rem;
        flex: 0 0 2.65rem;
        font-variant-numeric: tabular-nums;
        text-align: right;
        overflow: hidden;
        text-overflow: clip;
      }

      .lil-gui .controller.number.hasSlider .slider {
        min-width: 0;
        flex: 1 1 0;
      }

      .lil-gui .controller.number input {
        font-variant-numeric: tabular-nums;
      }

      .lil-gui .controller.param-row {
        display: flex;
        align-items: center;
      }

      .lil-gui .controller.param-row .widget {
        flex: 1;
        display: flex;
        align-items: center;
        gap: 0.175rem;
      }

      .lil-gui .drift-toggle {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 1.35rem;
        height: 1.35rem;
        margin-left: 0.25rem;
        border-radius: 0.25rem;
        cursor: pointer;
        opacity: 0.45;
        transition: opacity 0.15s ease, background 0.15s ease;
        flex-shrink: 0;
      }

      .lil-gui .drift-toggle:hover {
        opacity: 0.85;
        background: rgba(255, 255, 255, 0.08);
      }

      .lil-gui .drift-toggle.is-active {
        opacity: 1;
        background: rgba(120, 180, 255, 0.18);
      }

      .lil-gui .drift-toggle input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }

      .lil-gui .drift-toggle-icon {
        font-size: 0.72rem;
        line-height: 1;
        color: rgba(255, 255, 255, 0.85);
      }

      .lil-gui .controller.partial-drift .name {
        opacity: 0.75;
      }

      #hero-logo {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      .hero-logo-mark {
        display: block;
        width: 100vw;
        height: 100vh;
        object-fit: contain;
        object-position: center center;
        opacity: var(--logo-opacity, 1);
        mix-blend-mode: screen;
        transform: scale(var(--logo-scale, 1));
        transform-origin: center center;
      }

      .hero-logo-mark.is-hidden {
        display: none;
      }

      .lil-gui .title.gui-title-row {
        display: flex;
        align-items: center;
        min-height: 2.1rem;
        flex-wrap: nowrap;
        overflow: hidden;
        padding: 0.2rem 0.35rem 0.15rem;
        cursor: pointer;
      }

      .transport-cluster {
        display: flex;
        align-items: center;
        gap: 0.15rem;
        width: 100%;
        min-width: 0;
        flex-wrap: nowrap;
        cursor: default;
      }

      .title-actions {
        display: flex;
        align-items: center;
        gap: 0.2rem;
        flex: 0 0 auto;
        flex-wrap: nowrap;
        margin-left: auto;
        cursor: default;
      }

      .transport-group {
        display: flex;
        align-items: center;
        gap: 0.12rem;
        flex-shrink: 0;
        flex-wrap: nowrap;
        padding: 0.05rem 0.2rem 0.05rem 0.12rem;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 0.3rem;
        background: rgba(8, 8, 14, 0.45);
      }

      .transport-group--primary {
        gap: 0.18rem;
        height: 1.7rem;
        min-height: 1.7rem;
        padding: 0.1rem 0.28rem 0.1rem 0.18rem;
        border-color: rgba(255, 255, 255, 0.14);
        background: rgba(10, 10, 18, 0.58);
      }

      .transport-group--secondary {
        gap: 0.08rem;
        padding: 0.04rem 0.14rem 0.04rem 0.1rem;
      }

      .transport-group--vertical {
        gap: 0.1rem;
        padding: 0.06rem 0.14rem 0.06rem 0.1rem;
      }

      .transport-nav-stack {
        display: flex;
        flex-direction: column;
        gap: 0.04rem;
        flex-shrink: 0;
      }

      .transport-group + .transport-group {
        margin-left: 0.1rem;
      }

      .transport-group-label {
        flex-shrink: 0;
        font-size: 0.48rem;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.42);
        padding: 0 0.1rem 0 0.05rem;
        user-select: none;
      }

      .transport-group--secondary .transport-group-label {
        font-size: 0.44rem;
        padding: 0 0.06rem 0 0.04rem;
      }

      .transport-shader-label {
        flex: 0 0 6rem;
        width: 6rem;
        min-width: 6rem;
        max-width: 6rem;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        text-transform: none;
        letter-spacing: 0.02em;
        font-size: 0.58rem;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.78);
        padding: 0 0.12rem;
        text-align: center;
      }

      .transport-preset-label {
        flex: 0 0 2.35rem;
        width: 2.35rem;
        min-width: 2.35rem;
        max-width: 2.35rem;
        text-transform: none;
        letter-spacing: 0.02em;
        font-size: 0.56rem;
        font-weight: 600;
        font-variant-numeric: tabular-nums;
        color: rgba(255, 255, 255, 0.72);
        padding: 0 0.08rem;
        text-align: center;
      }

      /* Override lil-gui `.lil-gui button { width: 100%; border: none }` inside the title row */
      .lil-gui .title.gui-title-row .transport-btn {
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex: 0 0 auto;
        padding: 0;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 0.25rem;
        background: rgba(12, 12, 18, 0.72);
        color: rgba(255, 255, 255, 0.72);
        line-height: 1;
        cursor: pointer;
        overflow: hidden;
        -webkit-backdrop-filter: blur(8px);
        backdrop-filter: blur(8px);
        transition: color 0.15s ease, border-color 0.15s ease, background 0.15s ease;
      }

      .lil-gui .title.gui-title-row .transport-btn::after {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: inherit;
        background: radial-gradient(
          circle at 50% 50%,
          rgba(170, 215, 255, 0.72),
          rgba(110, 170, 255, 0.28)
        );
        opacity: 0;
        pointer-events: none;
      }

      .lil-gui .title.gui-title-row .transport-btn.is-flash::after {
        animation: transport-btn-glow 1s ease-out;
      }

      .lil-gui .title.gui-title-row .transport-btn.is-flash:not(.is-active) {
        animation: transport-btn-pulse 1s ease-out;
      }

      .lil-gui .title.gui-title-row .transport-btn.is-flash.is-active {
        animation: transport-btn-pulse-active 1s ease-out;
      }

      @keyframes transport-btn-glow {
        0% {
          opacity: 1;
        }
        18% {
          opacity: 0.92;
        }
        100% {
          opacity: 0;
        }
      }

      @keyframes transport-btn-pulse {
        0% {
          border-color: rgba(180, 220, 255, 0.95);
          color: #fff;
          filter: brightness(1.4);
          transform: scale(1.07);
        }
        100% {
          border-color: rgba(255, 255, 255, 0.14);
          color: rgba(255, 255, 255, 0.72);
          filter: brightness(1);
          transform: scale(1);
        }
      }

      @keyframes transport-btn-pulse-active {
        0% {
          filter: brightness(1.45);
          transform: scale(1.07);
        }
        100% {
          filter: brightness(1);
          transform: scale(1);
        }
      }

      .lil-gui .title.gui-title-row .transport-btn--primary {
        width: 1.65rem;
        height: 1.5rem;
        font-size: 1.35rem;
        border-radius: 0.3rem;
        border-color: rgba(255, 255, 255, 0.2);
        color: rgba(255, 255, 255, 0.88);
      }

      .lil-gui .title.gui-title-row .transport-btn--secondary {
        width: 1.1rem;
        height: 1rem;
        font-size: 0.78rem;
        border-radius: 0.2rem;
        color: rgba(255, 255, 255, 0.58);
      }

      .lil-gui .title.gui-title-row .transport-btn:hover,
      .lil-gui .title.gui-title-row .transport-btn:focus-visible {
        color: #fff;
        border-color: rgba(255, 255, 255, 0.32);
        background: rgba(24, 24, 36, 0.9);
        outline: none;
      }

      .lil-gui .title.gui-title-row .transport-btn.info-btn {
        width: 1.25rem;
        height: 1.25rem;
        border-radius: 50%;
        font-size: 0.62rem;
        font-weight: 600;
        font-style: italic;
        font-family: Georgia, 'Times New Roman', serif;
      }

      .lil-gui .title.gui-title-row .transport-btn:disabled {
        opacity: 0.35;
        cursor: not-allowed;
        pointer-events: none;
      }

      .lil-gui .title.gui-title-row .transport-btn.is-active {
        color: #fff;
        border-color: rgba(120, 180, 255, 0.55);
        background: rgba(80, 130, 210, 0.35);
      }

      .lil-gui .title.gui-title-row .transport-btn.autocycle-btn,
      .lil-gui .title.gui-title-row .transport-btn.smooth-btn {
        width: 1.35rem;
        height: 1.25rem;
        font-size: 0.72rem;
      }

      .lil-gui .title.gui-title-row .transport-btn.save-btn {
        width: 1.35rem;
        height: 1.25rem;
        font-size: 0.68rem;
      }

      .tutorial {
        position: fixed;
        inset: 0;
        z-index: 40;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        pointer-events: auto;
      }

      .tutorial.hidden {
        display: none;
      }

      .tutorial-backdrop {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.62);
        -webkit-backdrop-filter: blur(4px);
        backdrop-filter: blur(4px);
      }

      .tutorial-panel {
        position: relative;
        width: min(32rem, 100%);
        max-height: min(85vh, 720px);
        overflow: auto;
        padding: 1.5rem 1.5rem 1.25rem;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 0.75rem;
        background: rgba(14, 14, 22, 0.96);
        color: rgba(255, 255, 255, 0.88);
        box-shadow: 0 1rem 3rem rgba(0, 0, 0, 0.45);
      }

      .tutorial-panel:focus {
        outline: none;
      }

      .tutorial-close {
        position: absolute;
        top: 0.75rem;
        right: 0.75rem;
        width: 2rem;
        height: 2rem;
        border: none;
        border-radius: 0.35rem;
        background: transparent;
        color: rgba(255, 255, 255, 0.55);
        font-size: 1.35rem;
        line-height: 1;
        cursor: pointer;
      }

      .tutorial-close:hover,
      .tutorial-close:focus-visible {
        color: #fff;
        background: rgba(255, 255, 255, 0.08);
        outline: none;
      }

      .tutorial-panel h2 {
        margin: 0 2rem 0.35rem 0;
        font-size: 1.15rem;
        font-weight: 600;
        letter-spacing: 0.02em;
      }

      .tutorial-lead {
        margin: 0 0 1.1rem;
        color: rgba(255, 255, 255, 0.55);
        font-size: 0.88rem;
        line-height: 1.45;
      }

      .tutorial-section {
        margin-bottom: 1rem;
        padding-top: 0.85rem;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }

      .tutorial-section:first-of-type {
        border-top: none;
        padding-top: 0;
      }

      .tutorial-section h3 {
        margin: 0 0 0.45rem;
        font-size: 0.78rem;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: rgba(160, 200, 255, 0.95);
      }

      .tutorial-section p {
        margin: 0 0 0.55rem;
        font-size: 0.86rem;
        line-height: 1.55;
        color: rgba(255, 255, 255, 0.78);
      }

      .tutorial-section p:last-child {
        margin-bottom: 0;
      }

      .tutorial-keys {
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .tutorial-keys li {
        display: flex;
        align-items: center;
        gap: 0.65rem;
        margin-bottom: 0.4rem;
        font-size: 0.86rem;
        color: rgba(255, 255, 255, 0.78);
      }

      .tutorial-keys li:last-child {
        margin-bottom: 0;
      }

      kbd {
        display: inline-block;
        min-width: 1.5rem;
        padding: 0.12rem 0.4rem;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 0.25rem;
        background: rgba(255, 255, 255, 0.06);
        font-family: inherit;
        font-size: 0.75rem;
        text-align: center;
        color: rgba(255, 255, 255, 0.9);
      }
    </style>
  </head>
  <body>
    <div id="overlay" aria-hidden="true">
      <div id="hero-logo">
        <img
          class="hero-logo-mark is-hidden"
          alt=""
          decoding="async"
          width="520"
          height="478"
        />
      </div>
    </div>
    <div id="hint">Space · settings &nbsp;|&nbsp; ? · tutorial &nbsp;|&nbsp; F · fullscreen &nbsp;|&nbsp; H · hide UI</div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
