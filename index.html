<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lobby Visualizer</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: system-ui, -apple-system, sans-serif;
      }

      canvas {
        display: block;
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
      }

      #overlay {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 20;
      }

      #hint {
        position: fixed;
        bottom: 1.25rem;
        left: 50%;
        transform: translateX(-50%);
        color: rgba(255, 255, 255, 0.35);
        font-size: 0.75rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        transition: opacity 1.2s ease;
        z-index: 20;
      }

      #hint.hidden {
        opacity: 0;
      }

      :root {
        --menu-bg-alpha: 0.8;
      }

      .lil-gui {
        --background-color: rgb(31 31 31 / var(--menu-bg-alpha));
        --title-background-color: rgb(17 17 17 / var(--menu-bg-alpha));
        --name-width: 36%;
        --spacing: 2px;
        --widget-padding: 0 0 0 1.5px;
      }

      .lil-gui.root {
        -webkit-backdrop-filter: blur(10px);
        backdrop-filter: blur(10px);
      }

      .lil-gui .controller.param-row {
        display: flex;
        align-items: center;
      }

      .lil-gui .controller.param-row .widget {
        flex: 1;
        display: flex;
        align-items: center;
        gap: 0.175rem;
      }

      .lil-gui .drift-toggle {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 1.35rem;
        height: 1.35rem;
        margin-left: 0.25rem;
        border-radius: 0.25rem;
        cursor: pointer;
        opacity: 0.45;
        transition: opacity 0.15s ease, background 0.15s ease;
        flex-shrink: 0;
      }

      .lil-gui .drift-toggle:hover {
        opacity: 0.85;
        background: rgba(255, 255, 255, 0.08);
      }

      .lil-gui .drift-toggle.is-active {
        opacity: 1;
        background: rgba(120, 180, 255, 0.18);
      }

      .lil-gui .drift-toggle input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }

      .lil-gui .drift-toggle-icon {
        font-size: 0.72rem;
        line-height: 1;
        color: rgba(255, 255, 255, 0.85);
      }

      .lil-gui .controller.partial-drift .name {
        opacity: 0.75;
      }

      #hero-logo {
        position: fixed;
        bottom: 1rem;
        left: 1rem;
        z-index: 10;
        display: flex;
        align-items: flex-end;
        justify-content: flex-start;
        pointer-events: none;
      }

      .hero-logo-mark {
        height: 1.35rem;
        width: min(5.5rem, 28vw);
        background: rgba(255, 255, 255, 0.42);
        opacity: 0.55;
        -webkit-mask-image: var(--hero-logo-url);
        mask-image: var(--hero-logo-url);
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: left center;
        mask-position: left center;
      }

      .hero-logo-mark.is-hidden {
        display: none;
      }

      .lil-gui .title.gui-title-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.35rem;
        min-height: 1.5rem;
        padding: 0.2rem 0.35rem 0.15rem;
        cursor: pointer;
      }

      .transport-cluster,
      .title-actions {
        display: flex;
        align-items: center;
        gap: 0.2rem;
        cursor: default;
      }

      .transport-btn {
        flex-shrink: 0;
        width: 1.35rem;
        height: 1.25rem;
        padding: 0;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 0.25rem;
        background: rgba(12, 12, 18, 0.72);
        color: rgba(255, 255, 255, 0.72);
        font-size: 0.58rem;
        line-height: 1;
        cursor: pointer;
        -webkit-backdrop-filter: blur(8px);
        backdrop-filter: blur(8px);
        transition: color 0.15s ease, border-color 0.15s ease, background 0.15s ease;
      }

      .transport-btn:hover,
      .transport-btn:focus-visible {
        color: #fff;
        border-color: rgba(255, 255, 255, 0.32);
        background: rgba(24, 24, 36, 0.9);
        outline: none;
      }

      .transport-btn.info-btn {
        width: 1.25rem;
        height: 1.25rem;
        border-radius: 50%;
        font-size: 0.62rem;
        font-weight: 600;
        font-style: italic;
        font-family: Georgia, 'Times New Roman', serif;
      }

      .transport-btn.save-btn {
        font-size: 0.68rem;
      }

      .tutorial {
        position: fixed;
        inset: 0;
        z-index: 40;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        pointer-events: auto;
      }

      .tutorial.hidden {
        display: none;
      }

      .tutorial-backdrop {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.62);
        -webkit-backdrop-filter: blur(4px);
        backdrop-filter: blur(4px);
      }

      .tutorial-panel {
        position: relative;
        width: min(32rem, 100%);
        max-height: min(85vh, 720px);
        overflow: auto;
        padding: 1.5rem 1.5rem 1.25rem;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 0.75rem;
        background: rgba(14, 14, 22, 0.96);
        color: rgba(255, 255, 255, 0.88);
        box-shadow: 0 1rem 3rem rgba(0, 0, 0, 0.45);
      }

      .tutorial-panel:focus {
        outline: none;
      }

      .tutorial-close {
        position: absolute;
        top: 0.75rem;
        right: 0.75rem;
        width: 2rem;
        height: 2rem;
        border: none;
        border-radius: 0.35rem;
        background: transparent;
        color: rgba(255, 255, 255, 0.55);
        font-size: 1.35rem;
        line-height: 1;
        cursor: pointer;
      }

      .tutorial-close:hover,
      .tutorial-close:focus-visible {
        color: #fff;
        background: rgba(255, 255, 255, 0.08);
        outline: none;
      }

      .tutorial-panel h2 {
        margin: 0 2rem 0.35rem 0;
        font-size: 1.15rem;
        font-weight: 600;
        letter-spacing: 0.02em;
      }

      .tutorial-lead {
        margin: 0 0 1.1rem;
        color: rgba(255, 255, 255, 0.55);
        font-size: 0.88rem;
        line-height: 1.45;
      }

      .tutorial-section {
        margin-bottom: 1rem;
        padding-top: 0.85rem;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }

      .tutorial-section:first-of-type {
        border-top: none;
        padding-top: 0;
      }

      .tutorial-section h3 {
        margin: 0 0 0.45rem;
        font-size: 0.78rem;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: rgba(160, 200, 255, 0.95);
      }

      .tutorial-section p {
        margin: 0 0 0.55rem;
        font-size: 0.86rem;
        line-height: 1.55;
        color: rgba(255, 255, 255, 0.78);
      }

      .tutorial-section p:last-child {
        margin-bottom: 0;
      }

      .tutorial-keys {
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .tutorial-keys li {
        display: flex;
        align-items: center;
        gap: 0.65rem;
        margin-bottom: 0.4rem;
        font-size: 0.86rem;
        color: rgba(255, 255, 255, 0.78);
      }

      .tutorial-keys li:last-child {
        margin-bottom: 0;
      }

      kbd {
        display: inline-block;
        min-width: 1.5rem;
        padding: 0.12rem 0.4rem;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 0.25rem;
        background: rgba(255, 255, 255, 0.06);
        font-family: inherit;
        font-size: 0.75rem;
        text-align: center;
        color: rgba(255, 255, 255, 0.9);
      }
    </style>
  </head>
  <body>
    <div id="overlay" aria-hidden="true">
      <div id="hero-logo">
        <div class="hero-logo-mark is-hidden" role="img" aria-label="Logo"></div>
      </div>
    </div>
    <div id="hint">Space · settings &nbsp;|&nbsp; ? · tutorial &nbsp;|&nbsp; F · fullscreen &nbsp;|&nbsp; H · hide UI</div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
